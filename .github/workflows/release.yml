name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          xcodegen generate
          plutil -insert NSExtension \
            -json '{"NSExtensionPointIdentifier":"com.apple.widgetkit-extension"}' \
            TokenEaterWidget/Info.plist 2>/dev/null || true

      # --- Import Developer ID cert (Apple Developer Program) ---
      #
      # Secrets required in the repo:
      #   APPLE_CERT_P12_BASE64 - base64 of the exported .p12 (Developer ID Application + private key)
      #   APPLE_CERT_PASSWORD   - password used when exporting the .p12
      #   APPLE_TEAM_ID         - 10-char Team ID (e.g. ABCDE12345)
      #   APPLE_ID              - Apple ID email used by notarytool
      #   APPLE_APP_PASSWORD    - app-specific password generated at appleid.apple.com
      #
      # If APPLE_CERT_P12_BASE64 is empty, the workflow falls back to ad-hoc signing
      # (CI test builds can still produce artefacts, just not notarized).
      - name: Import signing cert
        id: import_cert
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERT_P12_BASE64" ]; then
            echo "signed=false" >> "$GITHUB_OUTPUT"
            echo "::warning::APPLE_CERT_P12_BASE64 not set, falling back to ad-hoc signing"
            exit 0
          fi
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          CERT_PATH="$RUNNER_TEMP/cert.p12"

          echo "$APPLE_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" \
            -P "$APPLE_CERT_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" "$(security default-keychain -d user | tr -d '"')"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null

          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -1 | awk '{print $2}')
          if [ -z "$IDENTITY" ]; then
            echo "::error::No Developer ID Application identity found in the imported cert"
            exit 1
          fi
          echo "identity=$IDENTITY" >> "$GITHUB_OUTPUT"
          echo "keychain=$KEYCHAIN_PATH" >> "$GITHUB_OUTPUT"
          echo "signed=true" >> "$GITHUB_OUTPUT"
          echo "Imported Developer ID cert (SHA1=$IDENTITY)"

      - name: Build
        env:
          SIGNED: ${{ steps.import_cert.outputs.signed }}
          IDENTITY: ${{ steps.import_cert.outputs.identity }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ "$SIGNED" = "true" ]; then
            xcodebuild \
              -project TokenEater.xcodeproj \
              -scheme TokenEaterApp \
              -configuration Release \
              -derivedDataPath build \
              CODE_SIGN_STYLE=Manual \
              CODE_SIGN_IDENTITY="$IDENTITY" \
              DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
              OTHER_CODE_SIGN_FLAGS="--timestamp --options=runtime" \
              build
          else
            xcodebuild \
              -project TokenEater.xcodeproj \
              -scheme TokenEaterApp \
              -configuration Release \
              -derivedDataPath build \
              build
          fi

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          create-dmg \
            --volname "TokenEater" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 128 \
            --icon "TokenEater.app" 160 190 \
            --app-drop-link 500 190 \
            --background "docs/dmg-background.png" \
            --hide-extension "TokenEater.app" \
            --no-internet-enable \
            TokenEater.dmg \
            "build/Build/Products/Release/TokenEater.app" \
            || true
          # create-dmg exits 2 on success when --no-internet-enable is used
          test -f TokenEater.dmg

      - name: Sign DMG with Developer ID
        if: steps.import_cert.outputs.signed == 'true'
        env:
          IDENTITY: ${{ steps.import_cert.outputs.identity }}
        run: |
          codesign --sign "$IDENTITY" --timestamp TokenEater.dmg
          codesign --verify --strict TokenEater.dmg

      - name: Notarize + staple
        if: steps.import_cert.outputs.signed == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          xcrun notarytool submit TokenEater.dmg \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait
          xcrun stapler staple TokenEater.dmg
          xcrun stapler validate TokenEater.dmg

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Compute SHA256
        id: sha
        run: echo "sha256=$(shasum -a 256 TokenEater.dmg | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Upload to GitHub Release
        run: |
          if gh release view "$GITHUB_REF_NAME" &>/dev/null; then
            gh release upload "$GITHUB_REF_NAME" TokenEater.dmg --clobber
          else
            gh release create "$GITHUB_REF_NAME" TokenEater.dmg \
              --title "TokenEater ${{ steps.version.outputs.version }}" \
              --generate-notes
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify release asset is downloadable
        run: |
          ASSET_URL="https://github.com/AThevon/TokenEater/releases/download/${GITHUB_REF_NAME}/TokenEater.dmg"
          echo "Verifying asset at: ${ASSET_URL}"
          HTTP_STATUS=$(curl -sL -o /dev/null -w '%{http_code}' "$ASSET_URL")
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::Release asset not downloadable (HTTP ${HTTP_STATUS}). Aborting."
            exit 1
          fi
          echo "Asset verified (HTTP ${HTTP_STATUS})"

      - name: Sign DMG with EdDSA for Sparkle
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          curl -sL "https://github.com/sparkle-project/Sparkle/releases/download/2.9.0/Sparkle-2.9.0.tar.xz" | tar xJ -C /tmp
          echo "$SPARKLE_PRIVATE_KEY" > /tmp/sparkle_key
          SIGN_OUTPUT=$(/tmp/bin/sign_update TokenEater.dmg --ed-key-file /tmp/sparkle_key)
          rm /tmp/sparkle_key
          ED_SIGNATURE=$(echo "$SIGN_OUTPUT" | sed -n 's/.*sparkle:edSignature="\([^"]*\)".*/\1/p')
          if [ -z "$ED_SIGNATURE" ]; then
            echo "::error::Failed to extract edSignature from sign_update output: $SIGN_OUTPUT"
            exit 1
          fi
          echo "ed_signature=$ED_SIGNATURE" >> "$GITHUB_OUTPUT"
          echo "Sparkle signature extracted (${#ED_SIGNATURE} chars)"
        id: sign

      - name: Update appcast.xml
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DMG_URL="https://github.com/AThevon/TokenEater/releases/download/v${VERSION}/TokenEater.dmg"
          DMG_LENGTH=$(stat -f%z TokenEater.dmg)
          PUB_DATE=$(date -u +"%a, %d %b %Y %H:%M:%S %z")
          ED_SIGNATURE="${{ steps.sign.outputs.ed_signature }}"

          ITEM="        <item>\n            <title>${VERSION}</title>\n            <pubDate>${PUB_DATE}</pubDate>\n            <sparkle:version>${VERSION}</sparkle:version>\n            <enclosure url=\"${DMG_URL}\" sparkle:edSignature=\"${ED_SIGNATURE}\" length=\"${DMG_LENGTH}\" type=\"application/octet-stream\" />\n        </item>"

          # Insert before </channel>
          sed -i '' "s|    </channel>|${ITEM}\n    </channel>|" docs/appcast.xml

      - name: Commit and push appcast
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/appcast.xml
          git commit -m "chore: update appcast for v${{ steps.version.outputs.version }}"
          # Push to the branch the tag was created on (or main for release tags)
          BRANCH=$(git branch -r --contains "$GITHUB_REF_NAME" | grep -v HEAD | head -1 | sed 's|origin/||;s/^ *//')
          [ -z "$BRANCH" ] && BRANCH=main
          git push origin HEAD:"$BRANCH"

      # Keep Homebrew cask updated during transition period
      - name: Update Homebrew Cask
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          NEW_VERSION: ${{ steps.version.outputs.version }}
          NEW_SHA: ${{ steps.sha.outputs.sha256 }}
        run: |
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/AThevon/homebrew-tokeneater.git" /tmp/tap
          cd /tmp/tap

          sed -i '' "s/version \".*\"/version \"${NEW_VERSION}\"/" Casks/tokeneater.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"${NEW_SHA}\"/" Casks/tokeneater.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/tokeneater.rb
          git commit -m "bump: tokeneater ${NEW_VERSION}"
          git push
