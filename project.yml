name: TokenEater
options:
  bundleIdPrefix: com.tokeneater
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  groupSortPosition: top
  defaultLocalization: en

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "4.10.0"
    CURRENT_PROJECT_VERSION: "1"
    ARCHS: "arm64 x86_64"

targets:
  TokenEaterApp:
    type: application
    platform: macOS
    sources:
      - path: TokenEaterApp
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tokeneater.app
        PRODUCT_NAME: TokenEater
        CODE_SIGN_ENTITLEMENTS: TokenEaterApp/TokenEaterApp.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: TokenEaterApp/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSApplicationCategoryType: public.app-category.utilities
        CFBundleDisplayName: TokenEater
        LSUIElement: true
        LSMultipleInstancesProhibited: true
        CFBundleURLTypes:
          - CFBundleURLName: com.tokeneater.app
            CFBundleURLSchemes:
              - tokeneater
    preBuildScripts:
      - script: |
          osacompile -o "$BUILT_PRODUCTS_DIR/$PRODUCT_NAME.app/Contents/Resources/TokenEaterInstaller.app" "$SRCROOT/TokenEaterApp/Resources/installer.applescript"
          osacompile -o "$BUILT_PRODUCTS_DIR/$PRODUCT_NAME.app/Contents/Resources/TokenEaterHelperInstaller.app" "$SRCROOT/TokenEaterApp/Resources/helper-installer.applescript"
        name: Compile installer applets
    postBuildScripts:
      - script: |
          # Embed TokenEaterHelper in Contents/Library/LoginItems (idiomatic spot for
          # login-style tools; app-sandbox-compatible because we are not embedding
          # an .app bundle here, just a command-line executable).
          mkdir -p "$BUILT_PRODUCTS_DIR/$PRODUCT_NAME.app/Contents/Library/LoginItems"
          if [ -f "$BUILT_PRODUCTS_DIR/TokenEaterHelper" ]; then
            cp "$BUILT_PRODUCTS_DIR/TokenEaterHelper" \
              "$BUILT_PRODUCTS_DIR/$PRODUCT_NAME.app/Contents/Library/LoginItems/TokenEaterHelper"
            chmod +x "$BUILT_PRODUCTS_DIR/$PRODUCT_NAME.app/Contents/Library/LoginItems/TokenEaterHelper"
          fi
        name: Embed Keychain helper binary
    dependencies:
      - target: TokenEaterWidgetExtension
        embed: true
      - target: TokenEaterHelper
        embed: false
        link: false

  TokenEaterHelper:
    type: tool
    platform: macOS
    sources:
      - path: TokenEaterHelper
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tokeneater.helper
        PRODUCT_NAME: TokenEaterHelper
        SKIP_INSTALL: "YES"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: "NO"

  TokenEaterTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: TokenEaterTests
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tokeneater.tests
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"

  TokenEaterWidgetExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: TokenEaterWidget
        excludes:
          - Info.plist
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tokeneater.app.widget
        PRODUCT_NAME: TokenEaterWidgetExtension
        CODE_SIGN_ENTITLEMENTS: TokenEaterWidget/TokenEaterWidget.entitlements
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @executable_path/../../../../Frameworks"
    info:
      path: TokenEaterWidget/Info.plist

schemes:
  TokenEaterTests:
    build:
      targets:
        TokenEaterTests: [test]
    test:
      config: Debug
      targets:
        - TokenEaterTests

  TokenEaterApp:
    build:
      targets:
        TokenEaterApp: all
        TokenEaterWidgetExtension: all
        TokenEaterHelper: all
    run:
      config: Debug
    archive:
      config: Release
